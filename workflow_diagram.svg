<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="640" fill="#f8faff" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2e5a">✈️ Travel Assistant — LangGraph Workflow</text>

  <!-- ══════════════════════════════════════════
       LAYER LABELS (left side)
       ══════════════════════════════════════════ -->
  <text x="18" y="115" font-size="10" fill="#888" transform="rotate(-90,18,115)">USER</text>
  <text x="18" y="235" font-size="10" fill="#888" transform="rotate(-90,18,235)">UI</text>
  <text x="18" y="380" font-size="10" fill="#888" transform="rotate(-90,18,380)">LANGGRAPH</text>
  <text x="18" y="530" font-size="10" fill="#888" transform="rotate(-90,18,530)">APIS</text>

  <!-- Horizontal dividers -->
  <line x1="40" y1="150" x2="860" y2="150" stroke="#dde3f0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="40" y1="290" x2="860" y2="290" stroke="#dde3f0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="40" y1="465" x2="860" y2="465" stroke="#dde3f0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ══════════════════════════════════════════
       USER
       ══════════════════════════════════════════ -->
  <rect x="350" y="62" width="200" height="56" rx="28" fill="#1a2e5a"/>
  <text x="450" y="88" text-anchor="middle" font-size="13" fill="white" font-weight="600">👤 User</text>
  <text x="450" y="108" text-anchor="middle" font-size="10" fill="#aac">Ask travel questions</text>

  <!-- ══════════════════════════════════════════
       GRADIO UI
       ══════════════════════════════════════════ -->
  <rect x="300" y="168" width="300" height="90" rx="10" fill="#2563eb" opacity="0.9"/>
  <text x="450" y="196" text-anchor="middle" font-size="13" fill="white" font-weight="600">🖥 Gradio Interface</text>
  <text x="450" y="216" text-anchor="middle" font-size="10" fill="#bcd">• Text input / Chat window</text>
  <text x="450" y="232" text-anchor="middle" font-size="10" fill="#bcd">• Session thread_id (memory key)</text>
  <text x="450" y="248" text-anchor="middle" font-size="10" fill="#bcd">• Example prompts &amp; Reset button</text>

  <!-- Arrow: User → Gradio -->
  <line x1="450" y1="118" x2="450" y2="168" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- Arrow: Gradio → User (response) -->
  <line x1="420" y1="168" x2="420" y2="118" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- ══════════════════════════════════════════
       LANGGRAPH GRAPH (big box)
       ══════════════════════════════════════════ -->
  <rect x="55" y="305" width="790" height="148" rx="10" fill="white" stroke="#c7d5f0" stroke-width="1.5"/>
  <text x="450" y="324" text-anchor="middle" font-size="11" fill="#6b7db3" font-weight="600">LangGraph Compiled Graph  (StateGraph + MemorySaver checkpointer)</text>

  <!-- State box -->
  <rect x="75" y="334" width="145" height="90" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="148" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">📦 AgentState</text>
  <text x="148" y="374" text-anchor="middle" font-size="9.5" fill="#3b5fc0">messages: list[AnyMessage]</text>
  <text x="148" y="390" text-anchor="middle" font-size="9" fill="#555">(merged via add_messages)</text>
  <text x="148" y="408" text-anchor="middle" font-size="9" fill="#555">Persisted per thread_id</text>

  <!-- Agent Node -->
  <rect x="260" y="334" width="170" height="90" rx="8" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="345" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">🧠 Agent Node</text>
  <text x="345" y="374" text-anchor="middle" font-size="9.5" fill="#7c5a00">GPT-4o-mini + bind_tools()</text>
  <text x="345" y="392" text-anchor="middle" font-size="9" fill="#555">Decides: answer directly</text>
  <text x="345" y="408" text-anchor="middle" font-size="9" fill="#555">or call a tool?</text>

  <!-- Conditional Router -->
  <polygon points="510,334 600,334 600,424 510,424" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5"/>
  <!-- diamond shape -->
  <polygon points="555,344 600,379 555,414 510,379" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="555" y="375" text-anchor="middle" font-size="10" font-weight="700" fill="#9d174d">should_</text>
  <text x="555" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#9d174d">continue?</text>

  <!-- Tool Node -->
  <rect x="640" y="334" width="185" height="90" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="733" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">⚙️ ToolNode</text>
  <text x="733" y="374" text-anchor="middle" font-size="9.5" fill="#166534">Executes selected tool</text>
  <text x="733" y="392" text-anchor="middle" font-size="9" fill="#555">Returns ToolMessage</text>
  <text x="733" y="408" text-anchor="middle" font-size="9" fill="#555">back into AgentState</text>

  <!-- Arrows inside graph -->
  <!-- State → Agent -->
  <line x1="220" y1="379" x2="260" y2="379" stroke="#6b7db3" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <!-- Agent → Router -->
  <line x1="430" y1="379" x2="510" y2="379" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <!-- Router → ToolNode -->
  <line x1="600" y1="379" x2="640" y2="379" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green2)"/>
  <!-- ToolNode → Agent (loop back, arc above) -->
  <path d="M733,334 Q733,310 345,310 Q260,310 345,334" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue2)"/>
  <text x="545" y="302" text-anchor="middle" font-size="9" fill="#3b82f6">tool result → back to agent</text>
  <!-- Router → END -->
  <line x1="555" y1="424" x2="555" y2="464" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="590" y="456" font-size="9" fill="#ef4444">END</text>

  <!-- Arrow: Gradio → LangGraph -->
  <line x1="450" y1="258" x2="450" y2="305" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- Arrow: LangGraph → Gradio (response) -->
  <line x1="430" y1="305" x2="430" y2="258" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>

  <!-- ══════════════════════════════════════════
       MEMORY BOX (side)
       ══════════════════════════════════════════ -->
  <rect x="55" y="470" width="220" height="74" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="165" y="492" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">🗄 MemorySaver</text>
  <text x="165" y="510" text-anchor="middle" font-size="9.5" fill="#92400e">Checkpoints AgentState</text>
  <text x="165" y="526" text-anchor="middle" font-size="9" fill="#555">per thread_id across turns</text>
  <text x="165" y="540" text-anchor="middle" font-size="9" fill="#555">(in-memory; swap → Redis/SQL)</text>
  <!-- Arrow: MemorySaver ↔ Graph -->
  <line x1="165" y1="453" x2="165" y2="470" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <line x1="185" y1="470" x2="185" y2="453" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>

  <!-- ══════════════════════════════════════════
       TOOL BOXES (bottom row)
       ══════════════════════════════════════════ -->

  <!-- Weather -->
  <rect x="305" y="472" width="135" height="68" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="373" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1">🌤 Weather</text>
  <text x="373" y="511" text-anchor="middle" font-size="9" fill="#555">OpenWeatherMap</text>
  <text x="373" y="526" text-anchor="middle" font-size="9" fill="#555">Current conditions</text>

  <!-- Search -->
  <rect x="455" y="472" width="135" height="68" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="523" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">🔍 Search</text>
  <text x="523" y="511" text-anchor="middle" font-size="9" fill="#555">Tavily Search API</text>
  <text x="523" y="526" text-anchor="middle" font-size="9" fill="#555">Destination info</text>

  <!-- Currency -->
  <rect x="605" y="472" width="135" height="68" rx="8" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="673" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">💱 Currency</text>
  <text x="673" y="511" text-anchor="middle" font-size="9" fill="#555">ExchangeRate-API</text>
  <text x="673" y="526" text-anchor="middle" font-size="9" fill="#555">Live FX rates</text>

  <!-- Duration -->
  <rect x="755" y="472" width="100" height="68" rx="8" fill="#fae8ff" stroke="#e879f9" stroke-width="1.5"/>
  <text x="805" y="494" text-anchor="middle" font-size="11" font-weight="700" fill="#701a75">📅 Duration</text>
  <text x="805" y="511" text-anchor="middle" font-size="9" fill="#555">Custom Python</text>
  <text x="805" y="526" text-anchor="middle" font-size="9" fill="#555">Date calculator</text>

  <!-- Arrows: ToolNode → each API -->
  <line x1="733" y1="424" x2="373" y2="472" stroke="#6b7db3" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <line x1="733" y1="424" x2="523" y2="472" stroke="#6b7db3" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <line x1="733" y1="424" x2="673" y2="472" stroke="#6b7db3" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <line x1="733" y1="424" x2="805" y2="472" stroke="#6b7db3" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>

  <!-- ══════════════════════════════════════════
       LEGEND
       ══════════════════════════════════════════ -->
  <rect x="55" y="560" width="790" height="64" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="75" y="578" font-size="10" font-weight="700" fill="#374151">Legend:</text>
  <line x1="130" y1="576" x2="175" y2="576" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="180" y="580" font-size="9.5" fill="#374151">User / LLM request</text>
  <line x1="280" y1="576" x2="325" y2="576" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="330" y="580" font-size="9.5" fill="#374151">Final response</text>
  <line x1="415" y1="576" x2="460" y2="576" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-blue2)"/>
  <text x="465" y="580" font-size="9.5" fill="#374151">Tool result loop</text>
  <line x1="555" y1="576" x2="600" y2="576" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <text x="605" y="580" font-size="9.5" fill="#374151">Memory checkpoint</text>
  <line x1="710" y1="576" x2="755" y2="576" stroke="#6b7db3" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="760" y="580" font-size="9.5" fill="#374151">Tool dispatch</text>

  <text x="75" y="610" font-size="9" fill="#888">
    Flow: User → Gradio → LangGraph.invoke() → Agent Node → [tool calls?] → ToolNode → APIs → Agent Node → Final Response → Gradio → User
  </text>

  <!-- ══════════════════════════════════════════
       ARROW MARKERS
       ══════════════════════════════════════════ -->
  <defs>
    <marker id="arr-blue"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arr-blue2"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arr-green2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-red"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arr-gray"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7db3"/>
    </marker>
  </defs>
</svg>
